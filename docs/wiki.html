<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shortcut Wiki — Halofun Trainer</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ── Wiki styles ──────────────────────────────────────────────────────────── */
.wiki-header {
  padding: 3rem 0 2rem;
  text-align: center;
}
.wiki-header h1 { margin-bottom: 0.4rem; }
.wiki-header p { color: var(--text2); font-size: 0.95rem; }

/* Toolbar */
.toolbar {
  position: sticky; top: 60px; z-index: 50;
  background: rgba(10,10,20,0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 0;
}
.toolbar-inner {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}

.search-wrap {
  flex: 1; min-width: 200px; max-width: 340px; position: relative;
}
.search-icon {
  position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 0.9rem; pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 0.55rem 0.75rem 0.55rem 2.2rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.875rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--accent); }

/* Category tabs */
.cat-tabs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.cat-tab {
  padding: 0.4rem 0.85rem;
  border-radius: 99px;
  font-size: 0.8rem; font-weight: 500;
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.cat-tab:hover { border-color: var(--border2); color: var(--text); }
.cat-tab.active {
  background: rgba(99,102,241,0.18);
  border-color: rgba(99,102,241,0.4);
  color: #a5b4fc;
}

/* Lang toggle */
.lang-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.lang-btn {
  padding: 0.4rem 0.8rem;
  font-size: 0.8rem; font-weight: 600;
  border: none; background: transparent; color: var(--text2);
  transition: all 0.2s; flex: 1;
}
.lang-btn.active { background: var(--accent); color: #fff; }

/* Grid */
.shortcuts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
  gap: 1rem;
  padding: 1.5rem 0 4rem;
}

/* Shortcut card */
.sc-card {
  background: rgba(26,26,53,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.2rem 1.3rem 1rem;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  display: flex; flex-direction: column; gap: 0.7rem;
}
.sc-card:hover {
  border-color: rgba(99,102,241,0.3);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}
.sc-card.hidden { display: none; }

.sc-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 0.5rem;
}

.sc-keys { display: flex; align-items: center; gap: 3px; flex-wrap: wrap; }
.sc-keys kbd { font-size: 0.78rem; }
.sc-keys .plus { color: var(--text3); font-size: 0.7rem; padding: 0 1px; }

.sc-badges { display: flex; gap: 0.4rem; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

.sc-label-en {
  font-size: 0.95rem; font-weight: 600; color: var(--text); line-height: 1.4;
}
.sc-label-zh {
  font-size: 0.82rem; color: var(--text2);
  display: none;
}
.lang-zh .sc-label-en { display: none; }
.lang-zh .sc-label-zh { display: block; }

/* Tip toggle */
.sc-tip-toggle {
  display: flex; align-items: center; gap: 0.4rem;
  background: none; border: none;
  color: var(--text3); font-size: 0.78rem;
  padding: 0; cursor: pointer;
  transition: color 0.2s;
  margin-top: 0.1rem;
}
.sc-tip-toggle:hover { color: var(--text2); }
.sc-tip-toggle .chevron { transition: transform 0.2s; display: inline-block; }
.sc-tip-toggle.open .chevron { transform: rotate(180deg); }

.sc-tip {
  display: none;
  padding: 0.7rem 0.9rem;
  background: rgba(99,102,241,0.07);
  border-left: 2px solid rgba(99,102,241,0.35);
  border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
  font-size: 0.83rem; color: var(--text2); line-height: 1.6;
  animation: fadeInUp 0.2s ease;
}
.sc-tip.visible { display: block; }
.sc-tip .tip-zh { display: none; font-size: 0.78rem; color: var(--text3); margin-top: 0.4rem; }
.lang-zh .sc-tip .tip-en { display: none; }
.lang-zh .sc-tip .tip-zh { display: block; }

/* Mastery indicator */
.sc-mastery {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.72rem; color: var(--text3);
  margin-top: 0.2rem;
}

/* No results */
.no-results {
  text-align: center; padding: 4rem; color: var(--text3);
  display: none; grid-column: 1/-1;
}
.no-results.visible { display: block; }

/* Category section headers */
.cat-header {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 0.75rem;
  padding: 0.5rem 0 0.25rem;
  margin-top: 0.5rem;
}
.cat-header-icon { font-size: 1.3rem; }
.cat-header-title { font-size: 1rem; font-weight: 700; }
.cat-header-title .en {}
.cat-header-title .zh { font-size: 0.78rem; color: var(--text3); font-weight: 400; margin-left: 0.4rem; }
.cat-header-line { flex: 1; height: 1px; background: var(--border); }
.cat-header-count { font-size: 0.75rem; color: var(--text3); }

/* Practice shortcut button */
.sc-practice-btn {
  display: inline-flex; align-items: center; gap: 0.3rem;
  padding: 0.25rem 0.65rem;
  border-radius: 6px; font-size: 0.72rem; font-weight: 600;
  background: rgba(99,102,241,0.12); color: #a5b4fc;
  border: 1px solid rgba(99,102,241,0.2);
  text-decoration: none;
  transition: background 0.2s;
}
.sc-practice-btn:hover { background: rgba(99,102,241,0.22); }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="nav-logo">
    <div class="logo-icon">🎬</div>
    Halofun Trainer
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Home</a>
    <a href="wiki.html" class="nav-link active">Wiki</a>
    <a href="challenge.html" class="nav-link">Challenge</a>
  </div>
</nav>

<div class="page">
  <div class="container">
    <div class="wiki-header anim-fadein">
      <h1><span class="gradient-text">Shortcut Wiki</span> <span style="font-size:0.5em;color:var(--text3);font-weight:400;">快捷键百科</span></h1>
      <p>All 24 shortcuts with contextual tips. Click any card to reveal the use case.</p>
    </div>
  </div>

  <div class="toolbar">
    <div class="container toolbar-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" type="text" placeholder="Search shortcuts… 搜索快捷键">
      </div>
      <div class="cat-tabs" id="catTabs">
        <button class="cat-tab active" data-cat="all">All</button>
      </div>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="en" id="btnEN">EN</button>
        <button class="lang-btn" data-lang="zh" id="btnZH">中文</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="shortcuts-grid" id="grid"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────
let currentLang = 'en';
let currentCat  = 'all';
let searchQuery = '';

// Load mastery from localStorage
function getStats() {
  try { return JSON.parse(localStorage.getItem('halo-challenge-stats') || '{}'); }
  catch { return {}; }
}

function getMasteryStars(id) {
  const stats = getStats();
  const s = stats[id];
  if (!s || s.attempts === 0) return 0;
  const pct = s.correct / s.attempts;
  if (pct >= 0.9 && s.attempts >= 5) return 3;
  if (pct >= 0.7 && s.attempts >= 3) return 2;
  if (s.attempts >= 1) return 1;
  return 0;
}

// ── Build UI ──────────────────────────────────────────────────────────────
function buildCatTabs() {
  const tabs = document.getElementById('catTabs');
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab';
    btn.dataset.cat = cat.id;
    btn.textContent = `${cat.icon} ${cat.en}`;
    tabs.appendChild(btn);
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const body = document.body;
  body.className = currentLang === 'zh' ? 'lang-zh' : '';

  // Group by category (respecting filter)
  let anyVisible = false;

  CATEGORIES.forEach(cat => {
    const inCat = SHORTCUTS.filter(s => s.category === cat.id);
    const visible = inCat.filter(s => matchesFilter(s));
    if (currentCat !== 'all' && currentCat !== cat.id) return;
    if (visible.length === 0) return;

    // Category header
    const header = document.createElement('div');
    header.className = 'cat-header anim-fadein';
    header.innerHTML = `
      <span class="cat-header-icon">${cat.icon}</span>
      <span class="cat-header-title">
        <span class="en">${cat.en}</span>
        <span class="zh">${cat.zh}</span>
      </span>
      <div class="cat-header-line"></div>
      <span class="cat-header-count">${visible.length} shortcut${visible.length>1?'s':''}</span>
    `;
    grid.appendChild(header);

    visible.forEach((s, i) => {
      anyVisible = true;
      grid.appendChild(buildCard(s, i * 50));
    });
  });

  if (!anyVisible) {
    const nr = document.createElement('div');
    nr.className = 'no-results visible';
    nr.textContent = 'No shortcuts match your search.';
    grid.appendChild(nr);
  }
}

function matchesFilter(s) {
  if (currentCat !== 'all' && s.category !== currentCat) return false;
  if (!searchQuery) return true;
  const q = searchQuery.toLowerCase();
  return (
    s.label.en.toLowerCase().includes(q) ||
    s.label.zh.includes(q) ||
    s.display.join(' ').toLowerCase().includes(q) ||
    s.tip.en.toLowerCase().includes(q) ||
    s.tip.zh.includes(q)
  );
}

function buildCard(s, delay = 0) {
  const cat = CATEGORIES.find(c => c.id === s.category);
  const stars = getMasteryStars(s.id);
  const starHtml = [1,2,3].map(n => `<span class="mastery-star${n > stars ? ' dim' : ''}">★</span>`).join('');

  const card = document.createElement('div');
  card.className = 'sc-card anim-fadein-up';
  card.style.animationDelay = `${delay}ms`;
  card.dataset.id = s.id;

  // Keys display
  let keysHtml = '';
  if (s.isSpecial) {
    keysHtml = s.display.map(k => `<kbd>${k}</kbd>`).join('<span class="plus"> / </span>');
  } else {
    keysHtml = s.display.map(k => `<kbd>${k}</kbd>`).join('<span class="plus">+</span>');
  }

  card.innerHTML = `
    <div class="sc-top">
      <div class="sc-keys">${keysHtml}</div>
      <div class="sc-badges">
        <span class="badge badge-${s.difficulty}">${s.difficulty}</span>
        <span class="badge badge-cat">${cat.icon} ${cat.en}</span>
      </div>
    </div>
    <div>
      <div class="sc-label-en">${s.label.en}</div>
      <div class="sc-label-zh">${s.label.zh}</div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
      <button class="sc-tip-toggle" data-id="${s.id}">
        💡 Show tip <span class="chevron">▼</span>
      </button>
      <div style="display:flex;gap:0.5rem;align-items:center;">
        <div class="sc-mastery">${starHtml}</div>
        <a href="challenge.html?shortcut=${s.id}" class="sc-practice-btn">⚡ Practice</a>
      </div>
    </div>
    <div class="sc-tip" id="tip-${s.id}">
      <span class="tip-en">${s.tip.en}</span>
      <span class="tip-zh">${s.tip.zh}</span>
    </div>
  `;
  return card;
}

// ── Events ────────────────────────────────────────────────────────────────
document.getElementById('catTabs').addEventListener('click', e => {
  const btn = e.target.closest('.cat-tab');
  if (!btn) return;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderGrid();
});

document.getElementById('btnEN').addEventListener('click', () => {
  currentLang = 'en';
  document.getElementById('btnEN').classList.add('active');
  document.getElementById('btnZH').classList.remove('active');
  document.body.className = '';
});
document.getElementById('btnZH').addEventListener('click', () => {
  currentLang = 'zh';
  document.getElementById('btnZH').classList.add('active');
  document.getElementById('btnEN').classList.remove('active');
  document.body.className = 'lang-zh';
});

// Tip toggles (delegated)
document.getElementById('grid').addEventListener('click', e => {
  const btn = e.target.closest('.sc-tip-toggle');
  if (!btn) return;
  const id = btn.dataset.id;
  const tip = document.getElementById('tip-' + id);
  const isOpen = tip.classList.toggle('visible');
  btn.classList.toggle('open', isOpen);
  btn.innerHTML = `💡 ${isOpen ? 'Hide tip' : 'Show tip'} <span class="chevron${isOpen ? ' open' : ''}">▼</span>`;
});

// ── Init ──────────────────────────────────────────────────────────────────
buildCatTabs();
renderGrid();

// Handle ?shortcut= param from practice button on index
const params = new URLSearchParams(location.search);
if (params.get('shortcut')) {
  setTimeout(() => {
    const card = document.querySelector(`[data-id="${params.get('shortcut')}"]`);
    if (card) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.borderColor = 'rgba(99,102,241,0.6)';
      card.style.boxShadow = '0 0 24px rgba(99,102,241,0.3)';
    }
  }, 300);
}
</script>
</body>
</html>
